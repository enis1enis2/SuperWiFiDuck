
[env:native]
platform = native
build_flags =
    -std=c++17
    -Wall
test_filter = test_parser_locale

[env:esp32-s2-kaluga-1]
platform = espressif32
board = esp32-s2-kaluga-1
framework = arduino
test_ignore = *
lib_deps =
    spacehuhn/SimpleCLI@^1.1.4
    me-no-dev/AsyncTCP@^1.1.1
    https://github.com/me-no-dev/ESPAsyncWebServer.git
build_flags =
    -D USB_CUSTOM_DESCRIPTORS
    -I custom_usb_descriptors
    -D USB_CUSTOM_PID=0x0002
    -D USB_VID=0x303a
    -D USB_MANUFACTURER='"Espressif Systems"'
lib_extra_dirs = custom_usb_descriptors

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
test_ignore = *
monitor_speed = 115200
upload_port = COM5
upload_speed = 115200

lib_deps =
    spacehuhn/SimpleCLI@^1.1.4
    me-no-dev/AsyncTCP@^1.1.1
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    t-vk/ESP32 BLE Keyboard@^0.3.2

build_flags =
    -D USB_CUSTOM_DESCRIPTORS
    -I custom_usb_descriptors
    -D USB_CUSTOM_PID=0x0002
    -D USB_VID=0x303a
    -D USB_MANUFACTURER='"Espressif Systems"'
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_extra_dirs = custom_usb_descriptors

[env:esp32-s2-test]
platform = espressif32
board = esp32-s2-kaluga-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200

[env:esp32-s3-test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM5
test_port = COM5
upload_speed = 115200
lib_deps =
    t-vk/ESP32 BLE Keyboard@^0.3.2
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
